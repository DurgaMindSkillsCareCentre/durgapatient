<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Durga Patient Records - Maintenance</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f5f7fa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:90%;
    max-width:550px;
    background:#fff;
    padding:40px 30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

h1{
    color:#d32f2f;
    margin-bottom:20px;
    font-size:34px;
}

p{
    color:#444;
    font-size:20px;
    line-height:1.7;
    margin-bottom:15px;
}

.small{
    font-size:16px;
    color:#777;
}
</style>
</head>

<body>

<div class="card">
<h1>🚧 System Under Maintenance 🚧</h1>

<p><strong>Durga Patient Records System</strong></p>

<p>
We are currently performing scheduled maintenance and system upgrades.
</p>

<p>
Please try again shortly.
</p>

<p class="small">
Thank you for your patience.
</p>

</div>

</body>
</html>
